name: 일일 HR 뉴스레터 자동화

on:
  workflow_dispatch: # 수동 실행 버튼 활성화
  schedule:
    - cron: '0 23 * * *' # 매일 아침 자동 실행 설정 (필요 시 유지)

jobs:
  run-newsletter:
    runs-on: ubuntu-latest

    steps:
    - name: 코드 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 안정적인 최신 파이썬 버전 지정

    - name: 필수 라이브러리 최신버전 강제 설치
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade google-genai requests beautifulsoup4
        # 최신 규격인 google-genai 패키지를 강제로 새로 설치하도록 명시했습니다.

    - name: 뉴스레터 스크립트 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python main.py
