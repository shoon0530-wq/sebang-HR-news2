name: 일일 HR 뉴스레터 자동화

on:
  schedule:
    # 23:00 UTC = 한국 시간(KST) 다음날 오전 08:00
    # 월~금 아침에 실행되도록 일~목 밤 23시로 설정 (0=일, 1=월, 2=화, 3=수, 4=목)
    - cron: '0 23 * * 0-4'
  workflow_dispatch: # 언제든 수동으로도 실행할 수 있게 유지합니다.

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: pip install requests beautifulsoup4 feedparser

      - name: 뉴스레터 스크립트 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python main.py
