name: Daily HR Newsletter Automation

on:
schedule:
# 한국 시간(KST) 오전 8시는 UTC 기준 전날 오후 11시입니다.
- cron: '0 23 * * *'
workflow_dispatch: # 직접 실행해보고 싶을 때 사용하는 버튼 활성화

jobs:
run-newsletter:
runs-on: ubuntu-latest
steps:
# STREAMING_CHUNK:코드 체크아웃 및 파이썬 설치...
- name: Checkout code
uses: actions/checkout@v3

  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.9'

  # STREAMING_CHUNK:필요 라이브러리 설치...
  - name: Install dependencies
    run: |
      pip install google-generativeai beautifulsoup4 requests

  # STREAMING_CHUNK:파이썬 스크립트 실행...
  - name: Run main script
    env:
      # GitHub Secrets에 등록한 값을 환경변수로 연결합니다.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PW: ${{ secrets.GMAIL_APP_PW }}
      RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
    run: python main.py
